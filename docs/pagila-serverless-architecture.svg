<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="1480" viewBox="0 0 1480 1480" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1480" height="1480" fill="#ffffff"/>

  <!-- title -->
  <text x="40" y="48" font-size="27" font-weight="bold" fill="#232F3E">AWS Serverless Pagila — Natural-Language → SQL</text>
  <text x="40" y="74" font-size="15" fill="#5A6B7B">Static web page · Amazon Bedrock (Claude Haiku 4.5) → read-only SQL · Aurora Serverless v2 (private) — us-east-1</text>

  <!-- AWS Cloud -->
  <rect x="206" y="100" width="1248" height="904" rx="10" fill="none" stroke="#232F3E" stroke-width="2"/>
  <text x="226" y="128" font-size="14" font-weight="bold" fill="#232F3E">AWS Cloud</text>
  <text x="226" y="146" font-size="11" fill="#5A6B7B">us-east-1</text>

  <!-- VPC -->
  <rect x="800" y="150" width="630" height="824" rx="8" fill="#F7F2FF" stroke="#8C4FFF" stroke-width="2"/>
  <text x="818" y="176" font-size="13" font-weight="bold" fill="#8C4FFF">VPC · 10.0.0.0/16 · private · no NAT</text>

  <!-- Private subnet -->
  <rect x="828" y="208" width="580" height="744" rx="6" fill="#F0F7FB" stroke="#147EBA" stroke-width="1.5"/>
  <text x="844" y="230" font-size="11" font-weight="bold" fill="#10688F">Private subnet · AZ-a · single-AZ data path</text>

  <!-- ============ EDGES (under icons) ============ -->
  <!-- 1 browser -> cloudfront/s3 -->
  <line x1="170" y1="498" x2="296" y2="248" stroke="#2E5B88" stroke-width="2.2" marker-end="url(#a)"/>
  <!-- 2 browser -> api gateway -->
  <line x1="170" y1="528" x2="296" y2="496" stroke="#2E5B88" stroke-width="2.2" marker-end="url(#a)"/>
  <!-- 3 api gateway -> ask lambda -->
  <line x1="378" y1="494" x2="556" y2="494" stroke="#2E5B88" stroke-width="2.2" marker-end="url(#a)"/>
  <!-- 4 ask lambda -> bedrock -->
  <line x1="577" y1="468" x2="577" y2="270" stroke="#2E5B88" stroke-width="2.2" marker-end="url(#a)"/>
  <line x1="589" y1="270" x2="589" y2="468" stroke="#9AA7B4" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#g)"/>
  <!-- 5 ask lambda -> query lambda (into VPC) -->
  <line x1="624" y1="486" x2="894" y2="330" stroke="#2E5B88" stroke-width="2.2" marker-end="url(#a)"/>
  <!-- 6 query lambda -> aurora -->
  <line x1="950" y1="318" x2="1224" y2="318" stroke="#2E5B88" stroke-width="2.2" marker-end="url(#a)"/>
  <line x1="1224" y1="338" x2="950" y2="338" stroke="#9AA7B4" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#g)"/>
  <!-- aux: query lambda -> endpoint -> secrets manager -->
  <line x1="923" y1="352" x2="923" y2="496" stroke="#2E5B88" stroke-width="2" marker-end="url(#a)"/>
  <line x1="898" y1="536" x2="612" y2="772" stroke="#2E5B88" stroke-width="2" marker-end="url(#a)"/>
  <!-- deploy: seeder -> aurora -->
  <line x1="1253" y1="556" x2="1253" y2="352" stroke="#147E84" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#t)"/>

  <!-- ============ ICONS ============ -->
  <!-- Browser / you -->
  <rect x="36" y="460" width="132" height="120" rx="8" fill="#FFFFFF" stroke="#9AA7B4" stroke-width="1.4"/>
  <g>
    <rect x="79" y="478" width="46" height="46" rx="8" fill="#232F3E"/>
    <circle cx="102" cy="494" r="7" fill="#ffffff"/>
    <path d="M88 516 q14 -16 28 0 z" fill="#ffffff"/>
  </g>
  <text x="102" y="548" font-size="13" font-weight="bold" fill="#232F3E" text-anchor="middle">You</text>
  <text x="102" y="565" font-size="11" fill="#5A6B7B" text-anchor="middle">browser</text>

  <!-- CloudFront + S3 -->
  <g>
    <rect x="300" y="196" width="46" height="46" rx="8" fill="#8C4FFF"/>
    <text x="323" y="225" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">CF</text>
  </g>
  <text x="323" y="262" font-size="12" font-weight="bold" fill="#232F3E" text-anchor="middle">CloudFront + S3</text>
  <text x="323" y="277" font-size="10" fill="#5A6B7B" text-anchor="middle">static site (the page)</text>

  <!-- API Gateway -->
  <g>
    <rect x="300" y="470" width="46" height="46" rx="8" fill="#8C4FFF"/>
    <text x="323" y="499" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">API</text>
  </g>
  <text x="323" y="536" font-size="12" font-weight="bold" fill="#232F3E" text-anchor="middle">API Gateway</text>
  <text x="323" y="551" font-size="10" fill="#5A6B7B" text-anchor="middle">POST /ask · /query</text>

  <!-- Bedrock -->
  <g>
    <rect x="560" y="196" width="46" height="46" rx="8" fill="#01A88D"/>
    <path d="M583 205 L587 216 L598 219 L587 222 L583 233 L579 222 L568 219 L579 216 Z" fill="#ffffff"/>
  </g>
  <text x="583" y="262" font-size="12" font-weight="bold" fill="#232F3E" text-anchor="middle">Amazon Bedrock</text>
  <text x="583" y="277" font-size="10" fill="#5A6B7B" text-anchor="middle">Claude Haiku 4.5</text>

  <!-- Ask Lambda -->
  <g>
    <rect x="560" y="470" width="46" height="46" rx="8" fill="#ED7100"/>
    <text x="583" y="502" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Georgia, serif">&#955;</text>
  </g>
  <text x="583" y="536" font-size="12" font-weight="bold" fill="#232F3E" text-anchor="middle">Ask Lambda · no VPC</text>
  <text x="583" y="551" font-size="10" fill="#5A6B7B" text-anchor="middle">NL→SQL orchestrator</text>

  <!-- Secrets Manager -->
  <g>
    <rect x="560" y="770" width="46" height="46" rx="8" fill="#DD344C"/>
    <path d="M576 790 a7 7 0 0 1 14 0" fill="none" stroke="#ffffff" stroke-width="2.4"/>
    <rect x="574" y="789" width="18" height="15" rx="2" fill="#ffffff"/>
    <circle cx="583" cy="796" r="2" fill="#DD344C"/>
  </g>
  <text x="583" y="836" font-size="12" font-weight="bold" fill="#232F3E" text-anchor="middle">Secrets Manager</text>
  <text x="583" y="851" font-size="10" fill="#5A6B7B" text-anchor="middle">DB credentials</text>

  <!-- Query Lambda -->
  <g>
    <rect x="900" y="282" width="46" height="46" rx="8" fill="#ED7100"/>
    <text x="923" y="314" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Georgia, serif">&#955;</text>
  </g>
  <text x="923" y="348" font-size="12" font-weight="bold" fill="#232F3E" text-anchor="middle">Query Lambda · in VPC</text>
  <text x="923" y="363" font-size="10" fill="#5A6B7B" text-anchor="middle">runs the SQL</text>

  <!-- Interface Endpoint -->
  <g>
    <rect x="900" y="500" width="46" height="46" rx="8" fill="#8C4FFF"/>
    <text x="923" y="528" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">VPCe</text>
  </g>
  <text x="923" y="566" font-size="12" font-weight="bold" fill="#232F3E" text-anchor="middle">Interface Endpoint</text>
  <text x="923" y="581" font-size="10" fill="#5A6B7B" text-anchor="middle">→ Secrets Manager</text>

  <!-- Aurora -->
  <g>
    <rect x="1230" y="282" width="46" height="46" rx="8" fill="#2E73B8"/>
    <ellipse cx="1253" cy="297" rx="12" ry="4" fill="#ffffff"/>
    <rect x="1241" y="297" width="24" height="16" fill="#ffffff"/>
    <ellipse cx="1253" cy="313" rx="12" ry="4" fill="#ffffff"/>
    <ellipse cx="1253" cy="305" rx="12" ry="4" fill="none" stroke="#2E73B8" stroke-width="1"/>
  </g>
  <text x="1253" y="348" font-size="12" font-weight="bold" fill="#232F3E" text-anchor="middle">Aurora PostgreSQL</text>
  <text x="1253" y="363" font-size="10" fill="#5A6B7B" text-anchor="middle">Serverless v2 · private</text>
  <text x="1253" y="378" font-size="10" fill="#147E84" text-anchor="middle">auto-pause at 0 ACU</text>

  <!-- Seeder (container) -->
  <g>
    <rect x="1228" y="556" width="50" height="50" rx="8" fill="#ED7100" stroke="#8a4600" stroke-width="2"/>
    <text x="1253" y="589" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Georgia, serif">&#955;</text>
  </g>
  <text x="1253" y="626" font-size="12" font-weight="bold" fill="#232F3E" text-anchor="middle">Seeder · container image</text>
  <text x="1253" y="641" font-size="10" fill="#5A6B7B" text-anchor="middle">psql + pg_restore</text>
  <text x="1253" y="656" font-size="10" fill="#5A6B7B" text-anchor="middle">(loads relational + JSONB)</text>

  <!-- ============ STEP BADGES ============ -->
  <g font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <circle cx="232" cy="366" r="13" fill="#00A4A6"/><text x="232" y="371">1</text>
    <circle cx="232" cy="520" r="13" fill="#00A4A6"/><text x="232" y="525">2</text>
    <circle cx="468" cy="478" r="13" fill="#00A4A6"/><text x="468" y="483">3</text>
    <circle cx="601" cy="370" r="13" fill="#00A4A6"/><text x="601" y="375">4</text>
    <circle cx="742" cy="396" r="13" fill="#00A4A6"/><text x="742" y="401">5</text>
    <circle cx="1086" cy="304" r="13" fill="#00A4A6"/><text x="1086" y="309">6</text>
  </g>
  <text x="1086" y="334" font-size="10" fill="#5A6B7B" text-anchor="middle">SQL :5432</text>
  <text x="735" y="690" font-size="10" fill="#5A6B7B" text-anchor="middle" transform="rotate(39 735 690)">read credentials</text>
  <text x="1300" y="470" font-size="10" fill="#147E84" text-anchor="middle" transform="rotate(-90 1300 470)">deploy: load data</text>

  <!-- ============ LEGEND ============ -->
  <rect x="36" y="612" width="232" height="332" rx="8" fill="#FAFAFA" stroke="#D6DBE0" stroke-width="1.2"/>
  <text x="48" y="636" font-size="13" font-weight="bold" fill="#232F3E">Request flow</text>
  <g font-size="11" fill="#39485A">
    <text x="48" y="662">1 · Load the page (S3 / CloudFront)</text>
    <text x="48" y="684">2 · Ask a question — POST /ask</text>
    <text x="48" y="706">3 · API Gateway → Ask Lambda</text>
    <text x="48" y="728">4 · Bedrock: question → SQL, explain</text>
    <text x="48" y="750">5 · Invoke the in-VPC query Lambda</text>
    <text x="48" y="772">6 · Run the SQL on Aurora</text>
  </g>
  <line x1="48" y1="788" x2="256" y2="788" stroke="#E0E4E8" stroke-width="1"/>
  <text x="48" y="808" font-size="10" fill="#5A6B7B">Read-only SELECT/WITH, guarded</text>
  <text x="48" y="826" font-size="10" fill="#5A6B7B">credentials via VPC endpoint</text>
  <text x="48" y="844" font-size="10" fill="#147E84">- - seeder loads data on deploy</text>
  <text x="48" y="862" font-size="10" fill="#5A6B7B">Ask Lambda is outside the VPC</text>
  <text x="48" y="880" font-size="10" fill="#147E84">Aurora auto-pauses when idle</text>

  <!-- markers -->
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#2E5B88"/>
    </marker>
    <marker id="g" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#9AA7B4"/>
    </marker>
    <marker id="t" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#147E84"/>
    </marker>
  </defs>
</svg>
